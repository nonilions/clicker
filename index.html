<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мега Кликер с Автосохранением</title>
    <style>
        /* Темный фон для всей страницы */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #ffffff;
            padding-top: 50px; 
        }
        /* Графитовая контрастная карточка игры */
        .container { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 10px; 
            display: inline-block; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            border: 1px solid #333;
        }
        /* Главная синяя кнопка клика */
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none; 
            background: #007bff; 
            color: white; 
            margin: 10px; 
            font-weight: bold;
            transition: background 0.2s, opacity 0.2s;
        }
        button:hover { background: #0056b3; }
        /* Разделитель магазина */
        .shop { 
            margin-top: 20px; 
            border-top: 1px solid #333; 
            padding-top: 20px; 
        }
        /* Зеленые активные кнопки улучшений (когда очков хватает) */
        .shop button { background: #28a745; font-size: 14px; padding: 10px 20px; }
        .shop button:hover { background: #218838; }
        
        /* СТИЛЬ ДЛЯ СЕРЫХ КНОПОК (когда очков НЕ хватает) */
        .shop button.disabled {
            background: #444444 !important;
            color: #888888 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .shop button.disabled:hover {
            background: #444444 !important;
        }

        /* Кнопка управления звуком */
        #music-toggle { background: #3a3a3a; font-size: 14px; padding: 8px 15px; border: 1px solid #555; }
        #music-toggle:hover { background: #4e4e4e; }
        /* Второстепенный тусклый текст для статистики */
        #stats-display { color: #aaaaaa; }
    </style>
</head>
<body>

<div class="container">
    <h2>ИГРА-КЛИКЕР</h2>
    <h1 id="score-display">0</h1>
    <p id="stats-display">Сила клика: 1 | В секунду: 0</p>
    
    <button id="click-btn">КЛИКАТЬ ТУТ!</button>

    <div class="shop">
        <h3>Магазин улучшений</h3>
        <!-- Изначально вешаем класс disabled, пока игра не проверит баланс -->
        <button id="upgrade-click" class="disabled">🚀 Сильный клик (+1 за нажатие) <span id="click-cost">15</span> очков</button>
        <button id="upgrade-auto" class="disabled">🤖 Автокликер (+1 в сек.) <span id="auto-cost">50</span> очков</button>
        <br><br>
        <button id="reset-btn" style="background:#dc3545;">Сбросить прогресс</button>
    </div>

    <div style="margin-top: 20px;">
        <button id="music-toggle">🔇 Звук: Выкл</button>
    </div>
</div>

<!-- Скрытый плеер с вашей локальной музыкой -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
