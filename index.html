<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мега Кликер с Автосохранением</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; margin: 10px; }
        button:hover { background: #0056b3; }
        .shop { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 20px; }
        .shop button { background: #28a745; font-size: 14px; padding: 10px 20px; }
        .shop button:hover { background: #218838; }
        #music-toggle { background: #6c757d; font-size: 14px; padding: 8px 15px; }
        #music-toggle:hover { background: #5a6268; }
    </style>
</head>
<body>

<div class="container">
    <h2>ИГРА-КЛИКЕР</h2>
    <h1 id="score-display">0</h1>
    <p id="stats-display">Сила клика: 1 | В секунду: 0</p>
    
    <!-- Главная кнопка клика с ID 'click-btn' -->
    <button id="click-btn">КЛИКАТЬ ТУТ!</button>

    <div class="shop">
        <h3>Магазин улучшений</h3>
        <button id="upgrade-click">🚀 Сильный клик (+1 за нажатие) <span id="click-cost">15</span> очков</button>
        <button id="upgrade-auto">🤖 Автокликер (+1 в сек.) <span id="auto-cost">50</span> очков</button>
        <br><br>
        <button id="reset-btn" style="background:#dc3545;">Сбросить прогресс</button>
    </div>

    <!-- Кнопка переключения музыки -->
    <div style="margin-top: 20px;">
        <button id="music-toggle">🔇 Звук: Выкл</button>
    </div>
</div>

<!-- Скрытый плеер со спокойной фоновой музыкой -->
<audio id="bg-music" loop>
    <source src="https://soundhelix.com" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
